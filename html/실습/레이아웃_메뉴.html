    <style>
       .badge{
        /*
        position 속성
             static (기본값-위치값 지정 안 됨)
             relative - 부모상자, 위치값
             absolute - 부모를 기준으로 배치(부모가 없다면 body를 기준)
             fixed - 고정배치
        */
        position: relative; /*기준이 되는 상자*/
        /* top: 10px;
        left: 10px; */

        border: none;
        padding: 10px 20px;
       }
       .badge_img{
        background-color: red;
        border-radius: 50%;
        padding: 10px;
        position: absolute;/*기준이 되는 상자로 부터 위치를 잡음*/
        top: -20px;
        right: -20px;
        /* bottom: ; */
        /* left */
       }
       .fixedbox{
        position: fixed;/*위치 고정*/
        top: 10px;
        right: 10px;
        background-color: blue;
       }
       body{
        height: 200vh;
       }
    </style>
