<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레이아웃</title>
    <style>
        *{
            box-sizing: border-box;
        }
        header{
            width: 100%;
            height: 400px;
            background-color: #eee;
        }
        main{
            width: 100%;
            /* vh : 창의 높이, vw : 창의 너비*/
            height: 70vh;
            background-color: aquamarine;
        }
        footer{
            width: 100%;
            height: 200px;
            background-color: aqua;
        }

        .container{
            width: 80%;
            margin: 0 auto;
        }
        .banner{
            height: 70px;
            line-height: 70px;
            background-color: blueviolet;
            color: white;
            text-align: center;
            /*16px*/
            font-size: 1.5rem;
            font-weight: 700;
        }
        .flexbox{
            display: flex;
            justify-content: end;
        }
        .quickmenu_item{
            width: 100px;

        }
        ul{
            list-style: none;
        }
        a{
            text-decoration: none;
            color: #333;
        }
        .top_quickmenu a{
            padding: 20px 20px;
        }
        .logo_item{
            text-align: right;
        }

    </style>
</head>
<body>
    <div class="container">
        <!--헤더 : 로고 퀵메뉴 메뉴-->
        <header>
            <div class="banner">👀 당일 배송</div>
            <div class="top_quickmenu flexbox">
                <a href="">로그인</a>
                <a href="">회원가입</a>
                <a href="">마이샵</a>
                <a href="">커뮤니티</a>
                <a href=""></a>
            </div>
            <div class="top_quickmenu">
                <ul class="flexbox">
                    <li class="quickmenu_item">로그인</li>
                    <li class="quickmenu_item">회원가입</li>
                    <li class="quickmenu_item">마이샵</li>
                    <li class="quickmenu_item">커뮤니티</li>
                    <li class="quickmenu_item">KR</li>
                </ul>
            </div>
        </header>
        <!--메인 : 서비스 되는 컨텐츠-->
        <main></main>
        <!--footer-->
        <footer></footer>




    </div>
</body>
</html>
